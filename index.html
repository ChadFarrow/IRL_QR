<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Big - Lightning Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>

    <div class="qr-container">
        <div id="qrcode"></div>
        <div class="lightning-address">chadf@fountain.fm</div>
        <div class="amount-row">
            <span class="amount-prefix">$</span>
            <input id="amount-input" class="amount-input" type="number" min="1" step="0.01" value="5.00" inputmode="decimal">
            <button id="info-btn" class="info-btn">i</button>
        </div>
        <div class="status" id="status">Enter an amount and generate invoice</div>
        <button id="refresh" class="refresh-btn">Generate Invoice</button>
        <a href="guide.html" class="guide-link">How to Pay with CashApp →</a>
    </div>

    <div class="feed-container">
        <h2 class="feed-title">Recent Payments</h2>
        <div id="boost-feed" class="boost-feed">
            <div class="feed-loading">Loading payments...</div>
        </div>
    </div>

    <div id="info-modal" class="modal">
        <div class="modal-content">
            <button id="close-modal" class="close-btn">&times;</button>
            <p>Enter any USD amount to generate a Lightning invoice.</p>
            <p>CashApp requires a $1 minimum for Lightning payments. The invoice will be converted to sats at the current BTC price.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
