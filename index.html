<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SXWW - Lightning Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>

    <header class="site-header">
        <h1 class="header-title">SXWORLDWIDE</h1>
    </header>

    <div class="wallet-toggle">
        <button class="toggle-btn active" data-wallet="albyhub">AlbyHub</button>
        <button class="toggle-btn" data-wallet="coinos">Coinos</button>
    </div>

    <div class="main-layout">
        <div class="qr-container">
            <div id="qrcode"></div>
            <div class="lightning-address" id="lightning-address"></div>
            <div class="scan-hint">Scan to send any amount</div>
        </div>

        <div class="feed-container">
            <h2 class="feed-title">Recent Payments</h2>
            <div id="boost-feed" class="boost-feed">
                <div class="feed-loading">Loading payments...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
