<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Big - Lightning Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>

    <div class="qr-container">
        <div id="qrcode"></div>
        <div class="lightning-address">ChadF@coinos.io</div>
        <div class="scan-hint">Scan to send any amount</div>
    </div>

    <div class="feed-container">
        <h2 class="feed-title">Recent Payments</h2>
        <div id="boost-feed" class="boost-feed">
            <div class="feed-loading">Loading payments...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
